<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Typograf</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="logo">¶</span>
        <div>
          <h1>Typograf</h1>
          <p class="tagline">Make your text typographically correct — with English line-breaking rules applied automatically.</p>
        </div>
      </div>
    </header>

    <section class="settings">
      <div class="setting-group">
        <span class="setting-label">Entities</span>
        <div class="segmented">
          <label><input type="radio" name="entityType" value="1" checked><span>HTML</span></label>
          <label><input type="radio" name="entityType" value="2"><span>XML</span></label>
          <label><input type="radio" name="entityType" value="4"><span>Mixed</span></label>
          <label><input type="radio" name="entityType" value="3"><span>None</span></label>
        </div>
      </div>
      <div class="setting-group">
        <span class="setting-label">Wrapping</span>
        <label class="checkbox"><input type="checkbox" id="useP"> <code>&lt;p&gt;</code></label>
        <label class="checkbox"><input type="checkbox" id="useBr"> <code>&lt;br&gt;</code></label>
      </div>
      <div class="setting-group">
        <label class="checkbox">max&nbsp;nobr <input type="number" id="maxNobr" value="3" min="0" max="20"></label>
      </div>
    </section>

    <main class="panes">
      <section class="card">
        <div class="card-head"><h2>Input</h2></div>
        <textarea id="input" placeholder="Paste or type text here…"></textarea>
        <div class="card-foot">
          <button id="go" class="primary">Typograf</button>
          <button id="copy" class="ghost">Copy HTML</button>
          <span class="status" id="status"></span>
        </div>
      </section>

      <section class="card">
        <div class="card-head"><h2>Result&nbsp;(HTML)</h2></div>
        <textarea id="output" readonly placeholder="Result HTML will appear here…"></textarea>
        <div class="preview-head">
          <span class="preview-title">Preview</span>
          <label class="switch" title="Highlight the characters Typograf changed">
            <input type="checkbox" id="hl" checked>
            <span class="track"><span class="thumb"></span></span>
            <span class="switch-label">Highlight changes</span>
          </label>
        </div>
        <div class="preview" id="preview"></div>
      </section>
    </main>

    <footer class="appfoot">
      Powered by the Art. Lebedev Typograf web service · ⌘/Ctrl + Enter to run
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
