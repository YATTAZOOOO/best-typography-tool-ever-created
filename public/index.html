<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Typograf</title>
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface-2: #fafbfc;
    --border: #e6e8ec;
    --text: #1a1d24;
    --muted: #6b7280;
    --accent: #5b5bd6;
    --accent-hover: #4a4ac4;
    --mark: #ffd6e0;
    --danger: #c01548;
    --radius: 12px;
    --shadow: 0 1px 2px rgba(16, 24, 40, 0.05), 0 8px 24px rgba(16, 24, 40, 0.05);
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  .app {
    max-width: 1140px;
    margin: 0 auto;
    padding: 32px 24px 48px;
  }

  /* Header */
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 44px; height: 44px; flex: none;
    display: grid; place-items: center;
    background: var(--accent); color: #fff;
    border-radius: 12px;
    font-size: 24px; font-weight: 700;
    box-shadow: var(--shadow);
  }
  h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .tagline { margin: 0; font-size: 13px; color: var(--muted); }

  /* Settings */
  .settings {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 18px;
    margin-bottom: 18px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px 28px;
  }
  .setting-group { display: flex; align-items: center; gap: 10px; }
  .setting-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

  .segmented { display: inline-flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px; padding: 3px; gap: 2px; }
  .segmented label { position: relative; cursor: pointer; }
  .segmented input { position: absolute; opacity: 0; pointer-events: none; }
  .segmented span {
    display: block; padding: 5px 12px; border-radius: 6px;
    font-size: 13px; font-weight: 500; color: var(--muted);
    transition: background 0.12s, color 0.12s;
  }
  .segmented input:checked + span { background: var(--accent); color: #fff; box-shadow: var(--shadow); }
  .segmented input:focus-visible + span { outline: 2px solid var(--accent); outline-offset: 2px; }

  .checkbox { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
  .checkbox input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .checkbox code { font-family: var(--mono); font-size: 12px; background: var(--surface-2); border: 1px solid var(--border); padding: 1px 5px; border-radius: 5px; }
  input[type=number] { width: 52px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 7px; font: inherit; font-size: 13px; accent-color: var(--accent); }
  input[type=number]:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }

  /* Panes */
  .panes { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    display: flex;
    flex-direction: column;
  }
  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .card-head h2 { margin: 0; font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  textarea {
    width: 100%; flex: 1; min-height: 240px; resize: vertical;
    border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px;
    font-family: var(--mono); font-size: 13px; line-height: 1.6; color: var(--text);
    background: var(--surface-2);
  }
  textarea:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  #output { min-height: 140px; }

  /* Preview */
  .preview-head { display: flex; align-items: center; justify-content: space-between; margin: 14px 0 6px; }
  .preview-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .preview {
    border: 1px solid var(--border); border-radius: 9px; padding: 14px 16px;
    background: var(--surface-2); min-height: 120px; flex: 1;
    font-size: 15px; line-height: 1.7; overflow-wrap: anywhere;
  }
  .preview:empty::before { content: "Rendered preview will appear here…"; color: var(--muted); font-size: 13px; }
  mark.tg-change { background: var(--mark); color: inherit; border-radius: 3px; padding: 0 1px; }

  /* Switch */
  .switch { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .switch input { position: absolute; opacity: 0; pointer-events: none; }
  .track {
    width: 34px; height: 20px; border-radius: 999px; background: #cfd3da;
    position: relative; transition: background 0.15s; flex: none;
  }
  .thumb { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.25); transition: transform 0.15s; }
  .switch input:checked ~ .track { background: var(--accent); }
  .switch input:checked ~ .track .thumb { transform: translateX(14px); }
  .switch input:focus-visible ~ .track { outline: 2px solid var(--accent); outline-offset: 2px; }
  .switch-label { font-size: 13px; color: var(--muted); }

  /* Buttons + footer */
  .card-foot { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  button {
    border: 0; border-radius: 9px; padding: 10px 18px;
    font: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background 0.12s, opacity 0.12s;
  }
  button.primary { background: var(--accent); color: #fff; }
  button.primary:hover { background: var(--accent-hover); }
  button.ghost { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  button.ghost:hover { background: #eef0f3; }
  button:disabled { opacity: 0.5; cursor: default; }
  .status { font-size: 12px; color: var(--muted); }
  .status.error { color: var(--danger); }

  .appfoot { margin-top: 28px; text-align: center; font-size: 12px; color: var(--muted); }

  @media (max-width: 820px) {
    .panes { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="logo">¶</span>
        <div>
          <h1>Typograf</h1>
          <p class="tagline">Make your text typographically correct — with English line-breaking rules applied automatically.</p>
        </div>
      </div>
    </header>

    <section class="settings">
      <div class="setting-group">
        <span class="setting-label">Entities</span>
        <div class="segmented">
          <label><input type="radio" name="entityType" value="1" checked><span>HTML</span></label>
          <label><input type="radio" name="entityType" value="2"><span>XML</span></label>
          <label><input type="radio" name="entityType" value="4"><span>Mixed</span></label>
          <label><input type="radio" name="entityType" value="3"><span>None</span></label>
        </div>
      </div>
      <div class="setting-group">
        <span class="setting-label">Wrapping</span>
        <label class="checkbox"><input type="checkbox" id="useP"> <code>&lt;p&gt;</code></label>
        <label class="checkbox"><input type="checkbox" id="useBr"> <code>&lt;br&gt;</code></label>
      </div>
      <div class="setting-group">
        <label class="checkbox">max&nbsp;nobr <input type="number" id="maxNobr" value="3" min="0" max="20"></label>
      </div>
    </section>

    <main class="panes">
      <section class="card">
        <div class="card-head"><h2>Input</h2></div>
        <textarea id="input" placeholder="Paste or type text here…"></textarea>
        <div class="card-foot">
          <button id="go" class="primary">Typograf</button>
          <button id="copy" class="ghost">Copy HTML</button>
          <span class="status" id="status"></span>
        </div>
      </section>

      <section class="card">
        <div class="card-head"><h2>Result&nbsp;(HTML)</h2></div>
        <textarea id="output" readonly placeholder="Result HTML will appear here…"></textarea>
        <div class="preview-head">
          <span class="preview-title">Preview</span>
          <label class="switch" title="Highlight the characters Typograf changed">
            <input type="checkbox" id="hl" checked>
            <span class="track"><span class="thumb"></span></span>
            <span class="switch-label">Highlight changes</span>
          </label>
        </div>
        <div class="preview" id="preview"></div>
      </section>
    </main>

    <footer class="appfoot">
      Powered by the Art. Lebedev Typograf web service · ⌘/Ctrl + Enter to run
    </footer>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const statusEl = $("status");
  let lastResult = "";
  let lastPreview = "";

  function setStatus(msg, isError) {
    statusEl.textContent = msg;
    statusEl.classList.toggle("error", !!isError);
  }

  function renderPreview() {
    $("preview").innerHTML = $("hl").checked ? lastPreview : lastResult;
  }

  async function run() {
    const text = $("input").value;
    if (!text.trim()) { setStatus("Nothing to process.", false); return; }
    const payload = {
      text,
      entityType: parseInt(document.querySelector('input[name=entityType]:checked').value, 10),
      useBr: $("useBr").checked,
      useP: $("useP").checked,
      maxNobr: parseInt($("maxNobr").value, 10) || 0,
    };
    $("go").disabled = true;
    setStatus("Processing…", false);
    try {
      const res = await fetch("/process", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) { setStatus("Error: " + (data.error || res.statusText), true); return; }
      lastResult = data.result || "";
      lastPreview = data.preview || lastResult;
      $("output").value = lastResult;
      renderPreview();
      setStatus("Done.", false);
    } catch (e) {
      setStatus("Network error: " + e.message, true);
    } finally {
      $("go").disabled = false;
    }
  }

  $("go").addEventListener("click", run);
  $("hl").addEventListener("change", renderPreview);
  $("copy").addEventListener("click", async () => {
    if (!lastResult) return;
    try {
      await navigator.clipboard.writeText(lastResult);
      setStatus("Copied.", false);
    } catch {
      $("output").select();
      document.execCommand("copy");
      setStatus("Copied.", false);
    }
  });
  $("input").addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") run();
  });
</script>
</body>
</html>
